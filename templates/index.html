<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Car Price Predictor</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 480px; margin: 3rem auto; padding: 0 1rem; }
    label { display: block; margin-top: .75rem; font-weight: 600; }
    input, select { width: 100%; padding: .5rem; margin-top: .25rem; box-sizing: border-box; }
    button { margin-top: 1.25rem; padding: .6rem 1.5rem; font-size: 1rem; cursor: pointer; }
    .result { margin-top: 1.5rem; padding: 1rem; background: #e8f5e9; border-radius: 6px; font-weight: 700; }
    .error { margin-top: 1.5rem; padding: 1rem; background: #ffebee; border-radius: 6px; color: #b71c1c; }
  </style>
</head>
<body>
  <h1>Car Price Predictor</h1>
  <form action="/predict" method="POST">
    <label for="Brand">Brand</label>
    <input id="Brand" name="Brand" required placeholder="e.g. Toyota">

    <label for="Model">Model</label>
    <input id="Model" name="Model" required placeholder="e.g. Camry">

    <label for="Year">Year</label>
    <input id="Year" name="Year" type="number" min="1980" max="2027" required>

    <label for="Fuel_Type">Fuel Type</label>
    <select id="Fuel_Type" name="Fuel_Type" required>
      <option>Petrol</option><option>Diesel</option><option>CNG</option>
      <option>Electric</option><option>Hybrid</option>
    </select>

    <label for="Transmission">Transmission</label>
    <select id="Transmission" name="Transmission" required>
      <option>Manual</option><option>Automatic</option>
    </select>

    <label for="Owner_Type">Owner Type</label>
    <select id="Owner_Type" name="Owner_Type" required>
      <option>First</option><option>Second</option><option>Third</option><option>Fourth+</option>
    </select>

    <label for="Kms_Driven">Kms Driven</label>
    <input id="Kms_Driven" name="Kms_Driven" type="number" min="0" required>

    <button type="submit">Predict Price</button>
  </form>

  {% if prediction %}<div class="result">{{ prediction }}</div>{% endif %}
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
</body>
</html>
